name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to publish (e.g. v0.6.0). Must already exist in git.'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} --bin aide-mcp

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Package
        id: pkg
        shell: bash
        run: |
          set -eux
          NAME="aide-mcp-${{ steps.ver.outputs.version }}-${{ matrix.target }}"
          mkdir -p "$NAME"
          cp README.md LICENSE "$NAME/"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            cp "target/${{ matrix.target }}/release/aide-mcp.exe" "$NAME/"
            7z a "${NAME}.zip" "$NAME" >/dev/null
            echo "artefact=${NAME}.zip" >> "$GITHUB_OUTPUT"
          else
            cp "target/${{ matrix.target }}/release/aide-mcp" "$NAME/"
            tar czf "${NAME}.tar.gz" "$NAME"
            echo "artefact=${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload as workflow artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.artefact }}
          path: ${{ steps.pkg.outputs.artefact }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: ver
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute SHA256SUMS
        working-directory: dist
        run: sha256sum aide-mcp-* > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: |
            dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
